name: Ottibonynyo Mods
concurrency:
  group: ottibonynyo-bot-group
  cancel-in-progress: true
  
on:
  schedule:
    # Berjalan setiap 30 menit
    - cron: '*/30 * * * *'
  # Memungkinkan Anda menjalankan manual melalui tab "Actions"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Both Bots
        # GANTI BAGIAN INI: Memanggil npm start agar menjalankan kedua file sekaligus
        run: npm start 
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
